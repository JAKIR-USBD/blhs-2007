<script>

/* Stars */
const starColors=["white","red","pink","yellow","lime","cyan","orange"];
for(let i=0;i<150;i++){
    const star=document.createElement("div");
    star.className="star";
    star.style.top=Math.random()*100+"%";
    star.style.left=Math.random()*100+"%";
    star.style.background=starColors[Math.floor(Math.random()*starColors.length)];
    star.style.animationDuration=(Math.random()*3+1)+"s";
    document.body.appendChild(star);
}

/* Fireworks */
const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");

function resize(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let particles=[];
function random(min,max){ return Math.random()*(max-min)+min; }

function createFirework(x=null,y=null,count=70){
    x = x || random(50,canvas.width-50);
    y = y || random(50,canvas.height/2);

    const colors=["lime","fuchsia","red","blue","pink","cyan","orange","gold"];
    const color=colors[Math.floor(Math.random()*colors.length)];

    for(let i=0;i<count;i++){
        particles.push({
            x,y,
            angle:random(0,Math.PI*2),
            speed:random(2,5),
            alpha:1,
            color
        });
    }
}

setInterval(()=>createFirework(),1000);
setInterval(()=>createFirework(canvas.width/2,canvas.height/3,200),12000);

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach((p,i)=>{
        p.x+=Math.cos(p.angle)*p.speed;
        p.y+=Math.sin(p.angle)*p.speed;
        p.alpha-=0.015;
        if(p.alpha<=0) particles.splice(i,1);
        ctx.globalAlpha=p.alpha;
        ctx.beginPath();
        ctx.arc(p.x,p.y,2,0,Math.PI*2);
        ctx.fillStyle=p.color;
        ctx.fill();
    });
    ctx.globalAlpha=1;
    requestAnimationFrame(animate);
}
animate();

/* Message Animation */
const lines=[
"🤲FROM SUHOOR TO EID PRAYER — EVERY EVENT MATTERED!💕",
"ON BEHALF OF",
"🏫BAYEZID LINE HIGH SCHOOL 2007🏫",
"🌙EID MUBARAK🌙"
];

const box=document.getElementById("message");

async function animateLine(text){

box.innerHTML="";

const words=text.split(" ");

words.forEach(w=>{
    const span=document.createElement("span");
    span.className="word";
    span.textContent=w;   // remove the " "
    box.appendChild(span);
});

const wordEls=box.querySelectorAll(".word");

if(text.includes("🌙EID MUBARAK🌙"))
box.className="message glow-eid";

else if(text==="🏫BAYEZID LINE HIGH SCHOOL 2007🏫")

box.className="message glow-quote";

else if(text==="ON BEHALF OF")
box.className="message glow-behalf";

else
box.className="message";

for(let i=0;i<wordEls.length;i++){
wordEls[i].classList.add("show");
await new Promise(r=>setTimeout(r,150));
}

await new Promise(r=>setTimeout(r,1000));
}
async function loop(){
    let i=0;
    while(true){
        await animateLine(lines[i%lines.length]);
        i++;
    }
}
loop();

</script>
